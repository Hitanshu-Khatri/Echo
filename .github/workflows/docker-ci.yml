name: Docker CI (DevOps Only)

on:
  push:
    branches:
      - devops

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/echo-backend ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/echo-backend

      - name: Build & Push Nginx
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/echo-nginx:latest \
            -f nginx/Dockerfile \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/echo-nginx:latest
  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/echo-app
          docker-compose pull
          docker-compose up -d
