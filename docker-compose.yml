version: "3.8"

services:
  backend:
    build: ./backend
    container_name: echo-backend
    env_file:
      - ./backend/.env
    expose:
      - "8000"

  nginx:
    build: 
      context: .
      dockerfile: nginx/Dockerfile
    container_name: echo-nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
