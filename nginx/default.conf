server {
    listen 80;
    server_name echo-webrtc.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name echo-webrtc.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/echo-webrtc.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echo-webrtc.duckdns.org/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://echo-backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
